# =============================================
# RestaurantPOS - Render Blueprint
# Solo el backend se despliega en Render
# El frontend se despliega en Vercel
# =============================================

databases: []

services:
  - type: web
    name: restaurantpos-backend
    runtime: node
    region: oregon
    plan: free
    branch: main
    rootDir: backend
    buildCommand: npm install --include=dev && npx prisma generate && npm run build
    startCommand: npm start
    envVars:
      - key: NODE_ENV
        value: production
      - key: PORT
        value: "3001"
      - key: DATABASE_URL
        sync: false
      - key: DATABASE_URL_dulcemomento
        sync: false
      - key: DATABASE_URL_buenosaires
        sync: false
      - key: JWT_SECRET
        sync: false
      - key: JWT_EXPIRES_IN
        value: "24h"
      - key: FRONTEND_URL
        sync: false
      - key: SUPABASE_URL_dulcemomento
        sync: false
      - key: SUPABASE_SERVICE_ROLE_KEY_dulcemomento
        sync: false
      - key: SUPABASE_URL_buenosaires
        sync: false
      - key: SUPABASE_SERVICE_ROLE_KEY_buenosaires
        sync: false
      - key: DEV_EMAIL
        value: "desarrollador@dev"
