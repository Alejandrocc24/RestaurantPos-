<div class="modal-overlay" (click)="onCerrar()">
  <div class="modal-content" (click)="$event.stopPropagation()">
    <div class="modal-header">
      <h2>{{ esEdicion ? 'Editar Categoría' : 'Nueva Categoría' }}</h2>
      <button class="close-btn" (click)="onCerrar()">
        <i class="fas fa-times"></i>
      </button>
    </div>

    <form (ngSubmit)="onSubmit()" class="modal-form">
      <div class="form-row">
        <div class="form-group">
          <label for="nombre">Nombre *</label>
          <input 
            type="text" 
            id="nombre" 
            name="nombre"
            [(ngModel)]="categoriaForm.nombre"
            required
            placeholder="Ingrese el nombre de la categoría">
        </div>

        <div class="form-group">
          <label for="estado">Estado *</label>
          <select 
            id="estado" 
            name="estado"
            [(ngModel)]="categoriaForm.estado"
            required>
            <option *ngFor="let estado of estados" [value]="estado">
              {{ estado }}
            </option>
          </select>
        </div>
      </div>



      <div class="form-actions">
        <button type="button" class="btn btn-secondary" (click)="onCerrar()">
          Cancelar
        </button>
        <button type="submit" class="btn btn-primary">
          {{ esEdicion ? 'Actualizar' : 'Crear' }}
        </button>
      </div>
    </form>
  </div>
</div>
