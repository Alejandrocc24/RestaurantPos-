<!-- login.component.html -->
<div class="login-container">
  <div class="login">
    <h1>Iniciar Sesión</h1>
    <form (submit)="onSubmit($event)">
      <input
        type="email"
        name="email"
        placeholder="Correo (usuario@negocio)"
        required="required"
        [(ngModel)]="email"
        (ngModelChange)="onEmailChange()"
        [disabled]="isLoading"
        class="form-control"
      />

      <div class="password-field">
        <input
          [type]="showPassword ? 'text' : 'password'"
          name="password"
          placeholder="Contraseña"
          required="required"
          [(ngModel)]="password"
          [disabled]="isLoading"
          class="form-control"
        />
        <button
          type="button"
          class="toggle-password"
          (click)="togglePasswordVisibility()"
          [attr.aria-pressed]="showPassword"
        >
          <i class="bi" [ngClass]="showPassword ? 'bi-eye-slash' : 'bi-eye'"></i>
        </button>
      </div>

      <!-- Campo de tenantId solo visible para el desarrollador (@dev) -->
      <div class="dev-tenant-field" *ngIf="isDevEmail">
        <label class="dev-label">
          <i class="bi bi-terminal"></i> Tenant de destino
        </label>
        <input
          type="text"
          name="tenantId"
          placeholder="Ej: dulcemomento, laparrilla"
          [(ngModel)]="devTenantId"
          [disabled]="isLoading"
          class="form-control dev-input"
        />
        <small class="dev-hint">
          Ingresa el identificador del cliente al que deseas acceder
        </small>
      </div>

      <button 
        type="submit" 
        class="btn btn-primary btn-block btn-large"
        [disabled]="isLoading"
      >
        <span *ngIf="!isLoading">Iniciar Sesión</span>
        <span *ngIf="isLoading">Cargando...</span>
      </button>
    </form>
  </div>
</div>
