<nav class="topnav" [class.collapsed]="isCollapsed">
  <div class="topnav-brand">
    <span class="brand-logo">🍽</span>
    <span class="brand-text">RestaurantPOS</span>
  </div>

  <button class="toggle-btn" (click)="toggleCollapse()" title="{{ isCollapsed ? 'Expandir menú' : 'Colapsar menú' }}">
    ☰
  </button>

  <div class="topnav-groups" *ngIf="!isCollapsed">
    <ng-container *ngFor="let group of menuGroups; let last = last">
      <div class="nav-group">
        <div class="group-items">
          <a *ngFor="let item of group.items"
             class="nav-item"
             [routerLink]="item.route"
             routerLinkActive="active"
             [title]="item.name">
            <span class="item-icon">{{ item.icon }}</span>
            <span class="item-text">{{ item.name }}</span>
          </a>
        </div>
      </div>
      <div class="group-divider" *ngIf="!last"></div>
    </ng-container>
  </div>

  <div class="topnav-right">
    <span class="current-time">{{ horaActual }}</span>
    <ng-container *ngIf="usuario$ | async as usuario">
      <div class="user-container">
        <div class="user-info">
          <span class="user-name">{{ usuario.nombre || usuario.email?.split('@')[0] || 'Usuario' }}</span>
          <span class="user-role-badge">{{ usuario.rol || (usuario.roles && usuario.roles[0]) || '' }}</span>
        </div>
      </div>
    </ng-container>
    <button class="logout-btn" (click)="logout()" title="Cerrar sesión">
      <span>⏻</span>
    </button>
  </div>
</nav>
